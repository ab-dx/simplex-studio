<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPLE ISA // STUDIO</title>
    <style>
        /* BRUTALIST DESIGN SYSTEM */
        :root {
            --bg: #ececec;
            --fg: #111111;
            --accent: #ff3300;
        }
        
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: "Courier New", Courier, monospace;
            margin: 0;
            padding: 2rem;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3rem;
            margin-top: 0;
            border-bottom: 4px solid var(--fg);
            padding-bottom: 0.5rem;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
        }

        .panel {
            background: #fff;
            border: 4px solid var(--fg);
            box-shadow: 8px 8px 0px var(--fg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: #fff;
            color: var(--fg);
            border: 2px solid var(--fg);
            font-family: "Courier New", Courier, monospace;
            font-size: 1rem;
            padding: 0.5rem;
            box-sizing: border-box;
            resize: vertical;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff9f8;
        }

        button {
            background: var(--fg);
            color: #fff;
            border: none;
            padding: 1rem;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }

        button:hover {
            background: var(--accent);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0px var(--fg);
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--fg);
        }

        .output-box {
            background: #e0e0e0;
            border: 2px solid var(--fg);
            padding: 1rem;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.9rem;
        }

        .registers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            background: var(--accent);
            color: #fff;
            padding: 1rem;
            border: 2px solid var(--fg);
        }

        /* NEW DEBUGGER CONTROLS */
        .debug-controls {
            display: none; /* Hidden until emulation succeeds */
            flex-direction: column;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .step-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            background: #e0e0e0;
            border: 2px solid var(--fg);
            padding: 0.5rem;
        }

        .step-row button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
        }

        .memory-inspector {
            background: #e0e0e0;
            border: 2px solid var(--fg);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .memory-inspector input {
            padding: 0.5rem;
            font-size: 1.1rem;
            font-family: inherit;
            border: 2px solid var(--fg);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>Simple ISA // Studio</h1>

    <div class="container">
        <div class="panel">
            <label for="editor"><strong>Assembly Source</strong></label>
            <textarea id="editor" spellcheck="false">
ldc 0x1000
a2sp
ldc 5
HALT</textarea>
            <button onclick="assemble()">1. Assemble</button>
            <button onclick="emulate()" style="background: var(--accent);">2. Emulate Binary</button>
        </div>

        <div class="panel">
            <label><strong>Registers (Live State)</strong></label>
            <div class="registers" id="reg-display">
                <div>PC: --------</div>
                <div>SP: --------</div>
                <div>A:  --------</div>
                <div>B:  --------</div>
            </div>

            <div class="debug-controls" id="debug-controls">
                
                <div class="step-row">
                    <button onclick="prevStep()">◀ PREV</button>
                    <span id="step-counter" style="font-weight: bold;">STEP 0 / 0</span>
                    <button onclick="nextStep()">NEXT ▶</button>
                </div>

                <div class="memory-inspector">
                    <label><strong>Memory Inspector</strong></label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="mem-addr" placeholder="ADDR (e.g. 0 or 0x1000)" style="flex: 1;">
                        <button onclick="inspectMemory()" style="padding: 0.5rem 1rem;">READ</button>
                    </div>
                    <div id="mem-value" style="font-size: 1.2rem; font-weight: bold; margin-top: 0.5rem;">VAL: ---</div>
                </div>
            </div>

            <label><strong>Raw Outputs</strong></label>
            <div class="output-box" id="raw-output">Awaiting input...</div>
        </div>
    </div>

    <script>
        let currentBinaryBlob = null;
        
        // Debugger State Variables
        let executionSteps = [];
        let finalMemory = [];
        let currentStepIndex = 0;

        async function assemble() {
            const code = document.getElementById('editor').value;
            const outputBox = document.getElementById('raw-output');
            
            outputBox.innerText = "STATUS: ASSEMBLING...\n";
            document.getElementById('debug-controls').style.display = 'none';

            try {
                const payload = code.trim() + "\n"; 
                const response = await fetch('http://localhost:8080/assemble', {
                    method: 'POST',
                    body: payload
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                currentBinaryBlob = await response.blob();
                const buffer = await currentBinaryBlob.arrayBuffer();
                const view = new Uint8Array(buffer);
                
                if (view.length === 0) {
                    outputBox.innerText = "ERROR: Assembler returned 0 bytes.";
                    return;
                }

                let hexDump = "--- MACHINE CODE (HEX) ---\n";
                for (let i = 0; i < view.length; i++) {
                    hexDump += view[i].toString(16).padStart(2, '0').toUpperCase();
                    if ((i + 1) % 4 === 0) hexDump += '\n';
                    else hexDump += ' ';
                }
                outputBox.innerText = hexDump;

            } catch (err) {
                outputBox.innerText = "ASSEMBLER ERROR:\n" + err.message;
            }
        }

        async function emulate() {
            const outputBox = document.getElementById('raw-output');
            if (!currentBinaryBlob) {
                alert("You must Assemble the code before Emulating!");
                return;
            }

            outputBox.innerText += "\nSTATUS: EMULATING...\n";
            document.getElementById('debug-controls').style.display = 'none';

            try {
                const response = await fetch('http://localhost:8080/emulate', {
                    method: 'POST',
                    body: currentBinaryBlob
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const rawJsonString = await response.text();
                outputBox.innerText += "\n--- EMULATOR OUTPUT RECEIVED ---\nSize: " + rawJsonString.length + " bytes.";

                try {
                    const parsedData = JSON.parse(rawJsonString);
                    
                    // Assign to our global debugger state
                    executionSteps = parsedData[0];
                    finalMemory = parsedData[1];
                    currentStepIndex = 0;

                    // Unhide the debugger controls
                    document.getElementById('debug-controls').style.display = 'flex';
                    renderStep();

                } catch (parseErr) {
                    outputBox.innerText += "\n\nWARNING: Could not parse emulator JSON. Check your C printf formatting!";
                }

            } catch (err) {
                outputBox.innerText += "\nEMULATOR ERROR:\n" + err.message;
            }
        }

        // --- DEBUGGER FUNCTIONS ---

        function renderStep() {
            if (!executionSteps || executionSteps.length === 0) return;
            
            const state = executionSteps[currentStepIndex];
            const regDisplay = document.getElementById('reg-display');
            
            if (state.error) {
                regDisplay.innerHTML = `<div style="grid-column: span 2; background: #000; color: #f30;">ERR: ${state.error}</div>`;
                return;
            }

            regDisplay.innerHTML = `
                <div>PC: ${state.PC || '0x00000000'}</div>
                <div>SP: ${state.SP || '0x00000000'}</div>
                <div>A:  ${state.A || '0x00000000'}</div>
                <div>B:  ${state.B || '0x00000000'}</div>
            `;
            
            document.getElementById('step-counter').innerText = `STEP ${currentStepIndex + 1} / ${executionSteps.length}`;
        }

        function nextStep() {
            if (currentStepIndex < executionSteps.length - 1) {
                currentStepIndex++;
                renderStep();
            }
        }

        function prevStep() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                renderStep();
            }
        }

        function inspectMemory() {
            if (!finalMemory || finalMemory.length === 0) return;
            
            const addrInput = document.getElementById('mem-addr').value.trim();
            const outVal = document.getElementById('mem-value');
            
            // Allow user to type 4096 OR 0x1000
            const isHex = addrInput.toLowerCase().startsWith('0x');
            const addr = parseInt(addrInput, isHex ? 16 : 10);
            
            if (isNaN(addr) || addr < 0 || addr >= finalMemory.length) {
                outVal.innerText = "VAL: [OUT OF BOUNDS]";
                return;
            }
            
            const val = finalMemory[addr];
            // Format output to show both decimal and 32-bit Hex (handling negatives cleanly)
            const hexVal = (val >>> 0).toString(16).toUpperCase().padStart(8, '0');
            outVal.innerText = `VAL: ${val} (0x${hexVal})`;
        }
    </script>
</body>
</html>
